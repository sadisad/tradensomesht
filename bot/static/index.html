<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot Trading Dashboard</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot" id="conn-dot"></span>
      <h1>Robot Trading</h1>
      <span id="status-line" class="muted"></span>
    </div>
    <div class="kpis">
      <div class="kpi"><label>Equity</label><span id="kpi-equity">--</span></div>
      <div class="kpi"><label>Balance</label><span id="kpi-balance">--</span></div>
      <div class="kpi"><label>Last price</label><span id="kpi-price">--</span></div>
      <div class="kpi"><label>Mode</label><span id="kpi-mode">--</span></div>
    </div>
  </header>

  <section class="stats-row">
    <div class="card stat"><label>Closed trades</label><strong id="s-closed">0</strong></div>
    <div class="card stat"><label>Win rate</label><strong id="s-wr">--</strong></div>
    <div class="card stat"><label>Total PnL</label><strong id="s-pnl">--</strong></div>
    <div class="card stat"><label>24h PnL</label><strong id="s-pnl24">--</strong></div>
    <div class="card stat"><label>Signals (acted/total)</label><strong id="s-sig">--</strong></div>
    <div class="card stat"><label>Last loss</label><strong id="s-lastloss">--</strong></div>
  </section>

  <main>
    <section class="card chart-card">
      <div class="card-header">
        <h2 id="chart-title">Chart</h2>
        <div class="muted" id="chart-sub"></div>
      </div>
      <div id="chart"></div>
    </section>

    <section class="card chart-card">
      <div class="card-header">
        <h2>Equity curve (cumulative PnL)</h2>
        <div class="muted" id="equity-sub"></div>
      </div>
      <div id="equity-chart"></div>
    </section>

    <section class="grid">
      <div class="card">
        <div class="card-header"><h2>Open positions</h2></div>
        <table id="positions-table">
          <thead><tr><th>Ticket</th><th>Side</th><th>Vol</th><th>Entry</th><th>SL</th><th>TP</th><th>PnL</th></tr></thead>
          <tbody></tbody>
        </table>
        <div id="positions-empty" class="muted">No open positions</div>
      </div>

      <div class="card">
        <div class="card-header"><h2>Recent signals</h2></div>
        <table id="signals-table">
          <thead><tr><th>Time</th><th>Side</th><th>Reason</th><th>Proba</th><th>Status</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="card span-2">
        <div class="card-header"><h2>Recent trades</h2></div>
        <table id="trades-table">
          <thead><tr><th>Closed</th><th>Side</th><th>Vol</th><th>Entry</th><th>Exit</th><th>Reason</th><th>PnL</th><th>W/L</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="muted">
    Auto-refresh every <span id="refresh-secs">5</span>s. Last update: <span id="last-update">--</span>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
